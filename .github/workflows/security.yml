name: build-and-security

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  security-events: write

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "26"

      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "9.6.1"

      - name: Build and test
        run: gradle build --no-daemon

  codeql:
    runs-on: ubuntu-latest
    needs: build-test
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "26"

      - uses: github/codeql-action/init@v3
        with:
          languages: java

      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "9.6.1"

      - name: Build for CodeQL
        run: gradle assemble --no-daemon

      - uses: github/codeql-action/analyze@v3

  docker-image-scan:
    runs-on: ubuntu-latest
    needs: build-test
    steps:
      - uses: actions/checkout@v4

      - name: Build image
        run: docker build -t health-app:ci .

      - name: Trivy vulnerability report (all severities, non-blocking)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: health-app:ci
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH,MEDIUM

      - uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-results.sarif

      - name: Trivy gate (fails build on CRITICAL)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: health-app:ci
          format: table
          severity: CRITICAL
          exit-code: "1"

  dast:
    runs-on: ubuntu-latest
    needs: build-test
    steps:
      - uses: actions/checkout@v4

      - name: Build image
        run: docker build -t health-app:ci .

      - name: Run container
        run: |
          docker run -d --name lab-app -p 8080:8080 health-app:ci
          for i in $(seq 1 30); do
            curl -sf http://localhost:8080/actuator/health && break
            sleep 2
          done

      - name: ZAP baseline scan
        uses: zaproxy/action-baseline@v0.14.0
        with:
          target: "http://localhost:8080"
          cmd_options: "-a"
          fail_action: false

      - name: Stop container
        if: always()
        run: docker rm -f lab-app
