name: build-and-security

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  security-events: write

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "26"

      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "9.6.1"

      - name: Build and test
        run: gradle build --no-daemon

  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Gitleaks
        uses: gitleaks/gitleaks-action@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  dockerfile-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Hadolint
        uses: hadolint/hadolint-action@v3.3.0
        with:
          dockerfile: Dockerfile

  dependency-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Trivy dependency report (all severities, non-blocking)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          format: sarif
          output: trivy-deps.sarif
          severity: CRITICAL,HIGH,MEDIUM

      - uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-deps.sarif
          category: dependency-scan

      - name: Trivy dependency gate (fails build on CRITICAL)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          format: table
          severity: CRITICAL
          exit-code: "1"

  codeql:
    runs-on: ubuntu-latest
    needs: build-test
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "26"

      - uses: github/codeql-action/init@v3
        with:
          languages: java

      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "9.6.1"

      - name: Build for CodeQL
        run: gradle assemble --no-daemon

      - uses: github/codeql-action/analyze@v3

  docker-image-scan:
    runs-on: ubuntu-latest
    needs: build-test
    steps:
      - uses: actions/checkout@v4

      - name: Build image
        run: docker build -t health-app:ci .

      - name: Trivy vulnerability report (all severities, non-blocking)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: health-app:ci
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH,MEDIUM

      - uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-results.sarif
          category: container-scan

      - name: Trivy gate (fails build on CRITICAL)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: health-app:ci
          format: table
          severity: CRITICAL
          exit-code: "1"

      - name: Generate SBOM
        uses: anchore/sbom-action@v0.22.0
        with:
          image: health-app:ci
          format: cyclonedx-json
          output-file: sbom.cyclonedx.json

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: sbom.cyclonedx.json

  dast:
    runs-on: ubuntu-latest
    needs: build-test
    steps:
      - uses: actions/checkout@v4

      - name: Build image
        run: docker build -t health-app:ci .

      - name: Run container
        run: |
          docker run -d --name lab-app -p 8080:8080 health-app:ci
          for i in $(seq 1 30); do
            curl -sf http://localhost:8080/actuator/health && break
            sleep 2
          done

      - name: ZAP baseline scan
        uses: zaproxy/action-baseline@v0.14.0
        with:
          target: "http://localhost:8080"
          cmd_options: "-a"
          fail_action: false

      - name: Stop container
        if: always()
        run: docker rm -f lab-app
