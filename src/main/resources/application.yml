server:
  port: 8080

spring:
  application:
    name: health-app
  threads:
    virtual:
      enabled: true
  datasource:
    url: jdbc:h2:mem:healthdb;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password: ""
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration

security:
  jwt:
    # Lab-only demo secret. In a real deployment this would come from an env var or a
    # secrets manager, never be committed, and be rotated. Must be at least 32 bytes for HS256.
    secret: "health-app-lab-only-demo-secret-do-not-use-in-prod!"
    validity: PT1H

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  tracing:
    enabled: false
  otlp:
    metrics:
      export:
        enabled: false

clients:
  health-app:
    base-url: http://localhost:${server.port}

---
spring:
  config:
    activate:
      on-profile: local

feign:
  client:
    config:
      default:
        logger-level: full

logging:
  level:
    com.example.lab.client: DEBUG

---
# Active when the app is run together with the observability stack (see docker-compose.yml),
# where Tempo is actually reachable. Metrics stay on the pull model: Prometheus scrapes
# /actuator/prometheus directly, there is no OTLP metrics receiver in this stack.
spring:
  config:
    activate:
      on-profile: observability

management:
  tracing:
    enabled: true
    sampling:
      probability: 1.0
  opentelemetry:
    tracing:
      export:
        otlp:
          endpoint: http://localhost:4318/v1/traces
