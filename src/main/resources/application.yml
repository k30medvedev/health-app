server:
  port: 8080

spring:
  application:
    name: health-app
  threads:
    virtual:
      enabled: true
  datasource:
    url: jdbc:h2:mem:healthdb;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password: ""
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  tracing:
    sampling:
      probability: 1.0
  opentelemetry:
    tracing:
      export:
        otlp:
          endpoint: http://localhost:4318/v1/traces

clients:
  health-app:
    base-url: http://localhost:${server.port}

---
spring:
  config:
    activate:
      on-profile: local

feign:
  client:
    config:
      default:
        logger-level: full

logging:
  level:
    com.example.lab.client: DEBUG
